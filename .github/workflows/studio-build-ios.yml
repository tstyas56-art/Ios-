name: Build Studio unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'studio/**'
      - '.github/workflows/studio-build-ios.yml'
  pull_request:
    paths:
      - 'studio/**'
      - '.github/workflows/studio-build-ios.yml'

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: studio

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🛠️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 Install dependencies
        run: npm install --no-audit --no-fund

      - name: ⚙️ Generate iOS project files
        run: npx expo prebuild -p ios --non-interactive

      - name: 🚀 Install CocoaPods & modify for unsigned build
        run: |
          cd ios

          pod install --repo-update

          # تعطيل التوقيع في مشروع Xcode الرئيسي
          PROJECT_FILE=$(find . -maxdepth 1 -name '*.xcodeproj' -print -quit)
          if [ -z "$PROJECT_FILE" ]; then
            echo 'No Xcode project generated.'
            exit 1
          fi
          sed -i '' 's/CODE_SIGNING_ALLOWED = YES/CODE_SIGNING_ALLOWED = NO/g' "$PROJECT_FILE/project.pbxproj"
          sed -i '' 's/CODE_SIGNING_REQUIRED = YES/CODE_SIGNING_REQUIRED = NO/g' "$PROJECT_FILE/project.pbxproj"

          # تعديل Podfile لتعطيل التوقيع في جميع Pods (نفس فكرة ZEUSNovels)
          python3 -c "
          import os
          path = 'Podfile'
          with open(path, 'r') as f:
              content = f.read()
          
          fix_code = '''
                installer.pods_project.targets.each do |target|
                  target.build_configurations.each do |config|
                    config.build_settings['GCC_OPTIMIZATION_LEVEL'] = '0'
                    config.build_settings['SWIFT_OPTIMIZATION_LEVEL'] = '-Onone'
                    config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                    config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                    config.build_settings['ENABLE_BITCODE'] = 'NO'
                  end
                end
          '''
          if 'post_install do |installer|' in content:
              new_content = content.replace('post_install do |installer|', 'post_install do |installer|' + fix_code)
              with open(path, 'w') as f:
                  f.write(new_content)
          "

          pod install

      - name: 🏗️ Build unsigned iOS app
        run: |
          cd ios
          set -eo pipefail

          WORKSPACE_PATH=$(find . -maxdepth 1 -name '*.xcworkspace' -print -quit)
          PROJECT_PATH=$(find . -maxdepth 1 -name '*.xcodeproj' -print -quit)

          # استخراج اسم الـ scheme من اسم الـ workspace أو المشروع
          if [ -n "$WORKSPACE_PATH" ]; then
            SCHEME_NAME=$(basename "$WORKSPACE_PATH" .xcworkspace)
            echo "🔨 Building workspace: $WORKSPACE_PATH, scheme: $SCHEME_NAME"
            xcodebuild build \
              -workspace "$WORKSPACE_PATH" \
              -scheme "$SCHEME_NAME" \
              -configuration Release \
              -sdk iphoneos \
              -destination 'generic/platform=iOS' \
              -derivedDataPath build_output \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              AD_HOC_CODE_SIGNING_ALLOWED=YES \
              COMPILER_INDEX_STORE_ENABLE=NO \
              2>&1 | tee build_log.txt
            EXIT_CODE=${PIPESTATUS[0]}
          else
            SCHEME_NAME=$(basename "$PROJECT_PATH" .xcodeproj)
            echo "🔨 Building project: $PROJECT_PATH, scheme: $SCHEME_NAME"
            xcodebuild build \
              -project "$PROJECT_PATH" \
              -scheme "$SCHEME_NAME" \
              -configuration Release \
              -sdk iphoneos \
              -destination 'generic/platform=iOS' \
              -derivedDataPath build_output \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              AD_HOC_CODE_SIGNING_ALLOWED=YES \
              COMPILER_INDEX_STORE_ENABLE=NO \
              2>&1 | tee build_log.txt
            EXIT_CODE=${PIPESTATUS[0]}
          fi

          if [ $EXIT_CODE -ne 0 ]; then
            echo ""
            echo "❌ BUILD FAILED. Last errors from log:"
            grep -E "error:" build_log.txt | tail -20 || true
            echo ""
            echo "Last 30 lines of build log:"
            tail -n 30 build_log.txt
            exit $EXIT_CODE
          fi

          echo "✅ Build succeeded. Searching for .app bundle..."

      - name: 📦 Create unsigned IPA
        run: |
          cd ios
          APP_PATH=$(find build_output -name "*.app" -type d | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "❌ App not found! Check build log above for errors."
            find build_output -maxdepth 4 || true
            exit 1
          fi

          echo "✅ Found app at: $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r studio-unsigned.ipa Payload
          echo "✅ IPA created: $(pwd)/studio-unsigned.ipa"

      - name: ⬆️ Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: studio-unsigned-ipa
          path: studio/ios/*.ipa
